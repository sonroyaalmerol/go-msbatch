version: 2

project_name: msbatch

before:
  hooks:
    - go mod tidy

builds:
  - id: msbatch
    main: ./cmd/msbatch
    binary: msbatch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: msbatch-lsp
    main: ./cmd/msbatch-lsp
    binary: msbatch-lsp
    env:
      - CGO_ENABLED=0
    # Windows is excluded: tliron/kutil v0.3.11 calls termenv methods that only
    # exist as package-level functions in termenv v0.15+, causing a build failure
    # when cross-compiling for Windows. Windows users can build from source or
    # use WSL until the upstream dependency is fixed.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: msbatch
    builds:
      - msbatch
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - docs/**

  - id: msbatch-lsp
    builds:
      - msbatch-lsp
    name_template: "msbatch-lsp_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other"
      order: 99
