name: Dev Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update dev tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f dev
          git push origin dev --force

      - name: Publish dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Development Build (main)"
          prerelease: true
          make_latest: false
          body: |
            Automated build from the `main` branch.

            **Commit:** ${{ github.sha }}
            **Built at:** ${{ github.event.head_commit.timestamp }}

            > This is a snapshot build and may be unstable.
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
